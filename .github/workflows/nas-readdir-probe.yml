name: NAS readdir probe

# Diagnostic for the intermittent NAS failures under the release matrix.
# v2: reproduces CONCURRENT + cross-connection + large-transfer load (the
# real conditions; sequential isolated lsf was 40/40 fine). Seeds a small
# dir + a big file, then runs P parallel workers each looping: cross-connection
# lsf (readdir) + copy of the big file. Counts readdir-empties and copy-fails,
# dumps rclone -vv on the first few failures so we see error vs timeout vs empty.
on:
  workflow_dispatch:
    inputs:
      parallel:
        description: "parallel workers"
        required: false
        default: "6"
      rounds:
        description: "rounds per worker"
        required: false
        default: "8"
      bigmb:
        description: "big-file size MB"
        required: false
        default: "120"

concurrency:
  group: nas-readdir-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: [self-hosted, Linux]
    env:
      RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF_B64 }}
      NAS_DEST: ${{ secrets.NAS_DEST }}
      PAR: ${{ github.event.inputs.parallel || '6' }}
      ROUNDS: ${{ github.event.inputs.rounds || '8' }}
      BIGMB: ${{ github.event.inputs.bigmb || '120' }}
    steps:
      - name: Concurrent NAS probe
        shell: bash
        run: |
          set -uo pipefail
          if ! command -v rclone >/dev/null 2>&1; then
            curl -fsSL https://downloads.rclone.org/rclone-current-linux-amd64.zip -o /tmp/rc.zip
            (cd /tmp && unzip -qo rc.zip && cp rclone-*-linux-amd64/rclone /tmp/rclone && chmod +x /tmp/rclone)
            export PATH="/tmp:$PATH"
          fi
          CONF="$(mktemp)"; printf '%s' "${RCLONE_CONF_B64}" | base64 -d > "$CONF"
          export RCLONE_CONFIG="$CONF"
          REMOTE="$(awk -F'[][]' '/^\[/{print $2; exit}' "$CONF")"
          FLAGS="--sftp-concurrency 1 --sftp-disable-concurrent-reads --timeout 30s --contimeout 10s"
          BASE="${NAS_DEST%/}/readdir-probe"

          echo "=== seed: 5 small files + 1 big (${BIGMB}MB) ==="
          tmp="$(mktemp -d)"; mkdir -p "$tmp/small"
          for i in 1 2 3 4 5; do echo "probe-$i" > "$tmp/small/file-$i.txt"; done
          head -c $((BIGMB*1024*1024)) /dev/urandom > "$tmp/big.bin"
          rclone copy "$tmp/small" "${REMOTE}:${BASE}/small" $FLAGS
          rclone copyto "$tmp/big.bin" "${REMOTE}:${BASE}/big.bin" $FLAGS
          echo "seeded."

          RES="$(mktemp -d)"
          worker() {
            local w="$1" empty=0 copyfail=0 r
            for r in $(seq 1 "${ROUNDS}"); do
              # cross-connection readdir
              n="$(rclone lsf "${REMOTE}:${BASE}/small/" $FLAGS 2>/dev/null | grep -c . || true)"
              if [ "$n" -eq 0 ]; then
                empty=$((empty+1))
                { echo "### worker $w round $r READDIR EMPTY"; rclone lsf "${REMOTE}:${BASE}/small/" $FLAGS -vv 2>&1 | tail -12; } >> "$RES/trace.$w" 2>&1
              fi
              # large transfer under load
              d="$(mktemp -d)"
              if ! rclone copyto "${REMOTE}:${BASE}/big.bin" "$d/big.bin" $FLAGS >/dev/null 2>"$RES/cperr.$w.$r"; then
                copyfail=$((copyfail+1))
                { echo "### worker $w round $r COPY FAIL"; tail -12 "$RES/cperr.$w.$r"; } >> "$RES/trace.$w" 2>&1
              elif [ ! -s "$d/big.bin" ]; then
                copyfail=$((copyfail+1))
                echo "### worker $w round $r COPY GAINED 0 (empty result)" >> "$RES/trace.$w"
              fi
              rm -rf "$d"
            done
            echo "$empty $copyfail" > "$RES/sum.$w"
          }

          echo "=== launch ${PAR} parallel workers x ${ROUNDS} rounds ==="
          for w in $(seq 1 "${PAR}"); do worker "$w" & done
          wait

          te=0; tc=0
          for w in $(seq 1 "${PAR}"); do
            read e c < "$RES/sum.$w" 2>/dev/null || { e=0; c=0; }
            te=$((te+e)); tc=$((tc+c))
          done
          total=$((PAR*ROUNDS))
          echo "=== RESULT: readdir-empty=${te}/${total}  copy-fail=${tc}/${total} (parallel=${PAR}) ==="
          echo "=== failure traces ==="
          cat "$RES"/trace.* 2>/dev/null | head -120 || echo "(no failures captured)"
          rclone purge "${REMOTE}:${BASE}" $FLAGS 2>/dev/null || true
          exit 0
