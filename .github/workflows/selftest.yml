name: Self-test

# Validates BOTH flavours end-to-end on a real self-hosted runner: upload a
# probe to the NAS, then download it back and diff. Uses `./upload` and
# `./download` so it tests THIS branch's actions verbatim.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roundtrip:
    name: NAS upload + download round-trip (nas-only)
    runs-on: [self-hosted, Linux]
    # Config set once at job level — both actions read it via env fallback,
    # so the steps need no nas-* inputs.
    env:
      RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF_B64 }}
      NAS_DEST: ${{ secrets.NAS_DEST }}
    steps:
      - name: Wipe workspace (self-hosted runner safety)
        run: rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* 2>/dev/null || true

      - uses: actions/checkout@v4

      - name: Build probe artifact
        run: |
          mkdir -p tmp
          {
            echo "run_id=${{ github.run_id }}"
            echo "repo=${{ github.repository }}"
            date -u +%FT%TZ
          } > tmp/probe.txt
          sha256sum tmp/probe.txt | awk '{print $1}' > tmp/probe.sha256

      - name: Upload to NAS (./upload, nas-only)
        uses: ./upload
        with:
          name: selftest-roundtrip
          path: tmp/probe.txt
          mode: nas-only

      - name: Clear local copy
        run: rm -rf tmp/probe.txt restored

      - name: Download from NAS (./download, nas-only)
        uses: ./download
        with:
          name: selftest-roundtrip
          path: restored
          mode: nas-only

      - name: Verify round-trip
        run: |
          test -f restored/probe.txt || { echo "::error::restored/probe.txt missing"; exit 1; }
          got="$(sha256sum restored/probe.txt | awk '{print $1}')"
          want="$(cat tmp/probe.sha256)"
          echo "want=$want got=$got"
          [ "$got" = "$want" ] || { echo "::error::checksum mismatch after round-trip"; exit 1; }
          echo "✅ round-trip OK"
