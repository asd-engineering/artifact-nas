name: "Download Artifact (NAS fallback)"
description: >-
  Download a CI artifact from GitHub Actions; if it isn't there (e.g. it was
  stored on the NAS because the storage quota was hit at upload time) fall back
  to fetching it from a NAS over rclone SFTP. Pairs with the upload flavour.
  Credentials come from GitHub secrets — no rclone.conf checked in.
author: "asd-engineering"

branding:
  icon: "download-cloud"
  color: "blue"

inputs:
  # --- artifact (mirrors actions/download-artifact) ---
  name:
    description: "Artifact name."
    required: true
  path:
    description: "Destination directory for the downloaded files."
    required: false
    default: "."

  # --- behaviour ---
  mode:
    description: >-
      fallback = GitHub first, NAS only if the GitHub artifact is missing (default).
      nas-only = skip GitHub, fetch from NAS only.
      cache    = NAS-only at a stable cross-run path
                 (<nas-dest>/cache/<name>/, no owner/repo/run/attempt
                 scoping). Cache miss (no files at that path) exits 0
                 with a "cache miss" note — NOT an error. Pair with
                 `mode: cache` on the upload action.
    required: false
    default: "fallback"

  # --- NAS creds (each input also reads its ambient $NAS_*/$RCLONE_CONF_B64) ---
  nas-host:
    description: "NAS SFTP host/IP. Falls back to $NAS_HOST."
    required: false
    default: ""
  nas-user:
    description: "NAS SFTP user. Falls back to $NAS_USER."
    required: false
    default: ""
  nas-pass:
    description: "NAS SFTP password (plaintext; obscured at runtime). Falls back to $NAS_PASS."
    required: false
    default: ""
  nas-port:
    description: "NAS SFTP port. Falls back to $NAS_PORT, then 22."
    required: false
    default: ""
  nas-dest:
    description: "Base path on the NAS to read from. Falls back to $NAS_DEST, then /artifacts."
    required: false
    default: ""

  # --- alternative: bring your own rclone.conf (base64) ---
  nas-conf-b64:
    description: >-
      base64 of a full rclone.conf. If set, takes precedence over the
      nas-host/user/pass inputs. Falls back to $RCLONE_CONF_B64.
    required: false
    default: ""
  nas-remote:
    description: >-
      rclone remote name inside nas-conf-b64. If empty, the first remote in the
      decoded conf is auto-detected.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Download from GitHub Actions artifacts
      id: gh
      # `cache` mode skips GitHub entirely (per-run GH artifacts don't fit
      # a cache contract — see upload action's mode docs).
      if: ${{ inputs.mode != 'nas-only' && inputs.mode != 'cache' }}
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

    - name: Download from NAS (rclone SFTP fallback)
      if: >-
        ${{ inputs.mode == 'nas-only' || inputs.mode == 'cache' ||
            (inputs.mode == 'fallback' && steps.gh.outcome == 'failure') }}
      shell: bash
      # Inputs come in as IN_* so they don't clobber the ambient NAS_*/
      # RCLONE_CONF_B64 a caller may set once at job level. Each value resolves
      # input-first, then ambient env, then a default.
      env:
        MODE: ${{ inputs.mode }}
        ART_NAME: ${{ inputs.name }}
        DEST_PATH: ${{ inputs.path }}
        IN_HOST: ${{ inputs.nas-host }}
        IN_USER: ${{ inputs.nas-user }}
        IN_PASS: ${{ inputs.nas-pass }}
        IN_PORT: ${{ inputs.nas-port }}
        IN_DEST: ${{ inputs.nas-dest }}
        IN_CONF_B64: ${{ inputs.nas-conf-b64 }}
        IN_REMOTE: ${{ inputs.nas-remote }}
      run: |
        set -euo pipefail

        # --- resolve config: input > ambient env > default ---
        NAS_CONF_B64="${IN_CONF_B64:-${RCLONE_CONF_B64:-}}"
        NAS_REMOTE="${IN_REMOTE:-${NAS_REMOTE:-}}"
        NAS_HOST="${IN_HOST:-${NAS_HOST:-}}"
        NAS_USER="${IN_USER:-${NAS_USER:-}}"
        NAS_PASS="${IN_PASS:-${NAS_PASS:-}}"
        NAS_PORT="${IN_PORT:-${NAS_PORT:-22}}"
        NAS_DEST="${IN_DEST:-${NAS_DEST:-/artifacts}}"
        DEST_PATH="${DEST_PATH:-.}"

        if [ "${MODE}" = "fallback" ]; then
          echo "::warning::GitHub artifact '${ART_NAME}' not found — falling back to NAS."
        fi

        # --- ensure rclone (no sudo: fetch the static binary into a temp dir) ---
        if ! command -v rclone >/dev/null 2>&1; then
          echo "rclone not found — downloading static binary…"
          case "$(uname -m)" in
            x86_64) RC_ARCH=amd64 ;;
            aarch64|arm64) RC_ARCH=arm64 ;;
            *) RC_ARCH=amd64 ;;
          esac
          case "$(uname -s)" in
            Linux)  RC_OS=linux ;;
            Darwin) RC_OS=osx ;;   # rclone names macOS builds "osx", not "darwin"
            *)      RC_OS=linux ;;
          esac
          RC_TMP="$(mktemp -d)"
          curl -fsSL "https://downloads.rclone.org/rclone-current-${RC_OS}-${RC_ARCH}.zip" -o "${RC_TMP}/rclone.zip"
          unzip -q "${RC_TMP}/rclone.zip" -d "${RC_TMP}"
          RC_BIN="$(find "${RC_TMP}" -type f -name rclone | head -n1)"
          chmod +x "${RC_BIN}"
          export PATH="$(dirname "${RC_BIN}"):${PATH}"
        fi
        echo "Using $(rclone version | head -n1)"

        # --- resolve remote: conf-b64 (file) takes precedence over user/pass ---
        REMOTE=""
        CLEANUP_CONF=""
        if [ -n "${NAS_CONF_B64}" ]; then
          CONF_FILE="$(mktemp)"
          CLEANUP_CONF="${CONF_FILE}"
          printf '%s' "${NAS_CONF_B64}" | base64 -d > "${CONF_FILE}"
          chmod 600 "${CONF_FILE}"
          export RCLONE_CONFIG="${CONF_FILE}"
          if [ -n "${NAS_REMOTE}" ]; then
            REMOTE="${NAS_REMOTE}"
          else
            REMOTE="$(sed -n 's/^\[\(.*\)\]$/\1/p' "${CONF_FILE}" | head -n1)"
            if [ -z "${REMOTE}" ]; then
              echo "::error::Could not auto-detect a remote from rclone.conf (no [section] found)." >&2
              exit 1
            fi
            echo "Auto-detected rclone remote: ${REMOTE}"
          fi
        elif [ -n "${NAS_HOST}" ] && [ -n "${NAS_USER}" ] && [ -n "${NAS_PASS}" ]; then
          OBSCURED="$(rclone obscure "${NAS_PASS}")"
          echo "::add-mask::${OBSCURED}"
          export RCLONE_CONFIG_NASFALLBACK_TYPE=sftp
          export RCLONE_CONFIG_NASFALLBACK_HOST="${NAS_HOST}"
          export RCLONE_CONFIG_NASFALLBACK_USER="${NAS_USER}"
          export RCLONE_CONFIG_NASFALLBACK_PORT="${NAS_PORT}"
          export RCLONE_CONFIG_NASFALLBACK_PASS="${OBSCURED}"
          export RCLONE_CONFIG_NASFALLBACK_SHELL_TYPE=unix
          export RCLONE_CONFIG_NASFALLBACK_MD5SUM_COMMAND=none
          export RCLONE_CONFIG_NASFALLBACK_SHA1SUM_COMMAND=none
          REMOTE="nasfallback"
        else
          echo "::error::No NAS credentials. Provide nas-host/nas-user/nas-pass OR nas-conf-b64." >&2
          exit 1
        fi

        cleanup() { [ -n "${CLEANUP_CONF}" ] && rm -f "${CLEANUP_CONF}" || true; }
        trap cleanup EXIT

        # --- source ---
        # Standard (fallback/nas-only): mirror upload's per-run layout
        #   <dest>/<owner/repo>/<run_id>/<name>/  (RUN_ID only — see upload
        #   action: attempt-scoping broke `--failed` re-runs since the
        #   succeeded producer doesn't re-run/re-upload at the new attempt)
        # Cache mode: stable cross-run path the upload-side cache mode
        # wrote to:
        #   <dest>/cache/<name>/
        if [ "${MODE}" = "cache" ]; then
          SRC_DIR="${NAS_DEST%/}/cache/${ART_NAME}"
        else
          SRC_DIR="${NAS_DEST%/}/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${ART_NAME}"
        fi
        echo "NAS source: ${REMOTE}:${SRC_DIR}"

        # --- parse multi-line DEST_PATH into individual items ---
        # Mirrors upload/action.yml's per-item iteration. Without this,
        # multi-line `path:` ended up dumped under DEST_PATH's first line.
        declare -a ITEMS=()
        while IFS= read -r line; do
          line="${line//$'\r'/}"
          [ -z "${line}" ] && continue
          for m in ${line}; do
            # ~ expansion — bash doesn't expand it inside quoted strings.
            # The prefix-removal pattern MUST be quoted ("~/") to suppress
            # the parameter-expansion's tilde-expansion: ${m#~/} would
            # expand the pattern to ${HOME}/ before matching, so the
            # literal "~/.bun" never matches and nothing is stripped —
            # leaving m="${HOME}/~/.bun" with a literal tilde dir.
            case "${m}" in
              "~/"*) m="${HOME}/${m#"~/"}" ;;
              "~")   m="${HOME}" ;;
            esac
            ITEMS+=("${m}")
          done
        done <<< "${DEST_PATH}"
        # Empty input: behave like the legacy single-target download (root = ".")
        if [ "${#ITEMS[@]}" -eq 0 ]; then
          ITEMS=(".")
        fi
        echo "Restore targets: ${ITEMS[*]}"

        # Hardened flags (v1.2.0):
        #   --sftp-concurrency 1                  one SSH channel at a time —
        #                                         avoids hammering sshd
        #                                         MaxStartups on appliances.
        #   --sftp-disable-concurrent-reads       same on the read side.
        #   --timeout 30s --contimeout 10s        bound NewFs + transfer hangs.
        # rclone_retry() handles the init-layer EOF that --retries does NOT
        # cover (see upload/action.yml for the full reasoning).
        RC_FLAGS=(
          --transfers 2 --checkers 2 --retries 1 --low-level-retries 10
          --sftp-concurrency 1 --sftp-disable-concurrent-reads
          --tpslimit 4 --tpslimit-burst 4
          --timeout 60s --contimeout 20s
          --stats-one-line
        )

        # --- wall-clock guard + NAS retry window (v1.5.0) --------------
        # Why: --contimeout bounds only the TCP dial and --timeout is an
        # idle-IO timer on an ESTABLISHED connection — neither covers the
        # SSH handshake / SFTP-subsystem open (NewFs). A NAS that accepts
        # the TCP connection then stalls mid-handshake wedges a single
        # rclone call forever (no output, no exit). See upload/action.yml
        # for the v1.4.8 incident this prevents.
        #
        # Policy: a refusing / stalling NAS is NOT "dead" — retry it, hard,
        # for a bounded window (RCLONE_MAX_TOTAL); GitHub-primary / cache-
        # miss is the LAST RESORT once the window is spent. Every rclone
        # runs under an OS wall-clock killer so a wedge becomes exit 124/137
        # and re-enters the retry loop. Deadline is per-subcommand: the
        # first call here is an `lsf` (short probe deadline — the handshake
        # hang surfaces here and we want to catch+retry it fast); `copy`
        # ops get a long deadline so a slow transfer isn't killed.
        # `timeout` (Linux) / `gtimeout` (macOS+coreutils); absent both we
        # run unguarded with a warning. Tunable: RCLONE_PROBE_TIMEOUT (45s),
        # RCLONE_OP_TIMEOUT (600s), RCLONE_MAX_TOTAL (NAS window, 300s).
        TIMEOUT_BIN=""
        if command -v timeout >/dev/null 2>&1; then TIMEOUT_BIN="timeout"
        elif command -v gtimeout >/dev/null 2>&1; then TIMEOUT_BIN="gtimeout"; fi
        [ -z "${TIMEOUT_BIN}" ] && echo "::warning::no 'timeout'/'gtimeout' on PATH — rclone runs without a wall-clock guard" >&2
        RCLONE_PROBE_TIMEOUT="${RCLONE_PROBE_TIMEOUT:-45s}"
        RCLONE_OP_TIMEOUT="${RCLONE_OP_TIMEOUT:-600s}"
        RCLONE_MAX_TOTAL="${RCLONE_MAX_TOTAL:-300}"
        run_rclone() {
          # Deadline by subcommand: copies may be legitimately long; list/
          # probe ops are quick, so a hang there is caught fast.
          local deadline="${RCLONE_PROBE_TIMEOUT}"
          case "${1:-}" in
            copy|copyto|sync|move|moveto) deadline="${RCLONE_OP_TIMEOUT}" ;;
          esac
          if [ -n "${TIMEOUT_BIN}" ]; then
            "${TIMEOUT_BIN}" --kill-after=15s "${deadline}" rclone "$@"
          else
            rclone "$@"
          fi
        }
        # rclone_retry — retry across the NAS retry window. Transient
        # (RETRY): wall-clock kill (124/137), connection refused (fail2ban /
        # sshd-not-ready — alive-but-refusing, NOT dead), and init-layer
        # races (MaxStartups, mid-handshake EOF, kex/handshake/reset/
        # broken-pipe/i-o-timeout/throttle). Spaced backoff (5,10,20,40,60s)
        # keeps "refused" retries from sustaining a fail2ban ban. Hard (NO
        # retry): auth / permission. Window exhausted → non-zero, caller
        # falls back (GitHub-first / cache-miss). Diagnostics go to stderr
        # so stdout stays clean for the `lsf` listing capture below.
        rclone_retry() {
          : "${NAS_T0:=$SECONDS}"   # NAS retry-window origin (first call wins)
          local backoff=5 errlog exit_code transient elapsed left
          while :; do
            errlog="$(mktemp)"
            # Capture rclone's exit explicitly in the else-branch (a bare
            # `if cmd; then` leaves $?=0 when the condition is false).
            if run_rclone "$@" 2> >(tee "$errlog" >&2); then
              rm -f "$errlog"
              return 0
            else
              exit_code=$?
            fi
            # Hard, non-retryable: bad credentials / permissions.
            if grep -qiE "permission denied|unable to authenticate|authentication failed|no such (host|identity)" "$errlog"; then
              echo "::error::NAS hard error (auth/permission) — not retryable" >&2
              rm -f "$errlog"
              return "$exit_code"
            fi
            transient=0
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ]; then
              echo "::warning::rclone wedged — killed by wall-clock guard (exit ${exit_code})" >&2
              transient=1
            elif grep -qiE "connection refused|NewFs:|couldn.?t initialise SFTP|couldn.?t connect|unexpected EOF|connection reset|connection closed|version packet|kex_exchange|handshake failed|broken pipe|i/o timeout|too many|throttl" "$errlog"; then
              transient=1
            fi
            rm -f "$errlog"
            [ "$transient" -ne 1 ] && return "$exit_code"   # unknown hard error
            elapsed=$((SECONDS - NAS_T0))
            if [ "$elapsed" -ge "${RCLONE_MAX_TOTAL}" ]; then
              echo "::error::NAS unreachable after ${elapsed}s (window ${RCLONE_MAX_TOTAL}s) — treating NAS as dead for this run" >&2
              return "$exit_code"
            fi
            left=$((RCLONE_MAX_TOTAL - elapsed))
            echo "::warning::NAS not ready (exit ${exit_code}) — retrying in ${backoff}s (${left}s of NAS window left)" >&2
            sleep "$backoff"
            backoff=$((backoff * 2)); [ "$backoff" -gt 60 ] && backoff=60
          done
        }
        # --- list the SRC_DIR once to learn what's there ---
        # We use this listing to (a) detect cache miss cheaply (one query
        # instead of one-failed-copy-per-item) and (b) distinguish files
        # from directories so we can mirror the upload-side layout — a
        # directory `node_modules` was uploaded as `<SRC_DIR>/node_modules/`,
        # so we restore by copying `<SRC_DIR>/node_modules` (a dir) INTO
        # the local `node_modules` dir (rclone copies CONTENTS). A file
        # `.env` was uploaded as `<SRC_DIR>/.env`, restored by copying
        # the remote file into its local PARENT (rclone copy file → dir
        # uses the file's basename for the destination filename).
        #
        # `lsf --max-depth 1` lists immediate children; entries ending in
        # `/` are dirs, otherwise files. Empty output = cache-miss (the
        # SRC_DIR doesn't exist on the remote). `|| true` because lsf on
        # a missing remote dir exits non-zero — that's the cache-miss
        # signal in `mode: cache`, and a hard error elsewhere (handled
        # via the ANY_HIT check below).
        REMOTE_LISTING="$(rclone_retry lsf --max-depth 1 "${REMOTE}:${SRC_DIR}/" "${RC_FLAGS[@]}" 2>/dev/null || true)"

        # --- LEGACY single-target case ----------------------------------
        # `path: .` (or any single root-like destination) means "dump
        # everything in SRC_DIR into this dir". This matches the v1.4.1
        # contract and is what windows-ci.yml's `Download pre-generated
        # build resources` step relies on — it ships 3 files
        # (symbols.json + tpl-defaults.json + skills.json) and the
        # consumer just wants them placed at the repo root.
        #
        # Detection: a single item that is `.`, `./`, `/`, or empty.
        # For these, fall through to the legacy single-rclone-copy path.
        if [ "${#ITEMS[@]}" -eq 1 ]; then
          single="${ITEMS[0]}"
          case "${single}" in
            "." | "./" | "/" | "")
              mkdir -p "${single:-.}"
              if rclone_retry copy "${REMOTE}:${SRC_DIR}" "${single:-.}" "${RC_FLAGS[@]}"; then
                if [ -n "$(ls -A "${single:-.}" 2>/dev/null)" ]; then
                  if [ "${MODE}" = "cache" ]; then
                    echo "✅ NAS cache HIT: ${ART_NAME} -> ${single}"
                  else
                    echo "✅ Artifact '${ART_NAME}' downloaded from NAS -> ${single}"
                  fi
                  exit 0
                fi
              fi
              if [ "${MODE}" = "cache" ]; then
                echo "NAS cache miss: ${ART_NAME} (no files under ${SRC_DIR})"
                exit 0
              fi
              echo "::error::NAS download produced no files from ${REMOTE}:${SRC_DIR}" >&2
              exit 1
              ;;
          esac
        fi

        # --- per-item restore (multi-line path OR single named target) ---
        ANY_HIT=0
        for item in "${ITEMS[@]}"; do
          base="$(basename "${item}")"
          parent="$(dirname "${item}")"
          mkdir -p "${parent}"
          if echo "${REMOTE_LISTING}" | grep -qFx "${base}/"; then
            # Source is a directory → restore CONTENTS into ${item}
            mkdir -p "${item}"
            if rclone_retry copy "${REMOTE}:${SRC_DIR}/${base}" "${item}" "${RC_FLAGS[@]}"; then
              [ -n "$(ls -A "${item}" 2>/dev/null)" ] && ANY_HIT=1
            fi
          elif echo "${REMOTE_LISTING}" | grep -qFx "${base}"; then
            # Source is a single file → drop into ${parent} (rclone uses
            # the source's basename for the resulting filename).
            if rclone_retry copy "${REMOTE}:${SRC_DIR}/${base}" "${parent}" "${RC_FLAGS[@]}"; then
              [ -e "${item}" ] && ANY_HIT=1
            fi
          fi
          # else: item not present on remote → skip silently. In `mode:
          # cache` that's a partial miss (one item not in cache, others
          # may still be). In non-cache modes we error below if NOTHING
          # was restored.
        done

        # --- outcome ---
        # `cache` mode tolerates the source not existing — cache miss is
        # not an error, just means a prior run hasn't populated this key.
        # For non-cache modes, missing source IS an error (the upload
        # should have run before us in the same workflow).
        # --- legacy fallback for single-target callers ----------------
        # If per-item missed for the only target AND the remote IS
        # populated (REMOTE_LISTING non-empty), the caller used a name
        # that doesn't match upload's basename — e.g. download
        # `path: dist/` paired with upload `path: dist/asd-linux-x64.tar.gz`
        # (file). Upload's file-branch flattens: remote has
        # `<SRC_DIR>/asd-linux-x64.tar.gz`, no `dist/` entry. v1.4.1's
        # unconditional `rclone copy SRC_DIR DEST_PATH` handled this
        # transparently; the per-item logic in v1.4.2/v1.4.3 doesn't.
        # release.yml has ~14 such call sites (path: dist/, path: scripts/,
        # path: metadata/, ...) — they break on the first nas-only path.
        # Fall through to the legacy `rclone copy SRC_DIR ITEM` semantic
        # to restore that compatibility. Multi-line callers don't hit
        # this path (the ANY_HIT=0 with multi-line genuinely means
        # nothing matched, which is the cache-miss / error case).
        #
        # v1.4.5: do NOT gate this on `[ -n "${REMOTE_LISTING}" ]`. The
        # `lsf` used to populate REMOTE_LISTING is wrapped in
        # `2>/dev/null || true`, so it returns EMPTY both on a genuine
        # empty dir AND on any lsf error (e.g. the Asustor sftpmand server
        # returned no entries / errored on readdir even though the file is
        # demonstrably on disk — observed 2026-05-29: upload landed a 77MB
        # zip, the download's lsf came back empty in 0.2s, the fallback was
        # skipped, "produced no files"). Gating the copy on lsf turned a
        # flaky LIST into a hard download failure. A single-target caller
        # (`path: dist/`) just wants "dump SRC_DIR here" — so attempt the
        # direct copy unconditionally and judge success by whether files
        # actually arrived (BEFORE/AFTER count), which is the real signal.
        if [ "${ANY_HIT}" -eq 0 ] && [ "${#ITEMS[@]}" -eq 1 ]; then
          single="${ITEMS[0]}"
          mkdir -p "${single}"
          # v1.4.6 — retry on a ZERO-GAIN copy. The Asustor sftpmand
          # readdir is intermittently flaky: `rclone copy` of a populated
          # SRC_DIR can return exit 0 having transferred NOTHING because
          # the server's directory listing came back empty on that call.
          # `rclone_retry` does NOT catch this (the copy "succeeds", exit 0),
          # so a single transient empty-readdir was a hard download failure
          # (observed 2026-05-29: install-scripts gained 0 files 35s after a
          # confirmed-good upload, while a sibling download succeeded seconds
          # earlier). Retry the copy when it gains nothing from a source we
          # expect to be populated. `cache` mode tolerates a genuine miss
          # (no retry storm — break on first zero-gain). Snapshot BEFORE so
          # we count only actually-new files (avoids the v1.4.3 pre-existing-
          # dir false positive).
          st_attempt=1; st_max=4; st_backoff=2
          while [ "${st_attempt}" -le "${st_max}" ]; do
            BEFORE_COUNT=$(find "${single}" -mindepth 1 2>/dev/null | wc -l)
            rclone_retry copy "${REMOTE}:${SRC_DIR}" "${single}" "${RC_FLAGS[@]}" || true
            AFTER_COUNT=$(find "${single}" -mindepth 1 2>/dev/null | wc -l)
            if [ "${AFTER_COUNT}" -gt "${BEFORE_COUNT}" ]; then
              ANY_HIT=1
              echo "Single-target restore: ${single} (gained $((AFTER_COUNT - BEFORE_COUNT)) entries, attempt ${st_attempt})"
              break
            fi
            [ "${MODE}" = "cache" ] && break  # genuine cache miss — don't retry
            if [ "${st_attempt}" -lt "${st_max}" ]; then
              echo "::warning::single-target copy gained 0 files from ${SRC_DIR} (sftpmand readdir glitch?) — retry ${st_attempt}/${st_max} in ${st_backoff}s"
              sleep "${st_backoff}"
              st_backoff=$((st_backoff * 2))
            fi
            st_attempt=$((st_attempt + 1))
          done
        fi

        if [ "${MODE}" = "cache" ]; then
          if [ "${ANY_HIT}" -eq 1 ]; then
            echo "✅ NAS cache HIT: ${ART_NAME} -> ${ITEMS[*]}"
          else
            echo "NAS cache miss: ${ART_NAME} (nothing under ${SRC_DIR})"
          fi
          exit 0
        fi

        if [ "${ANY_HIT}" -eq 0 ]; then
          echo "::error::NAS download produced no files from ${REMOTE}:${SRC_DIR}" >&2
          exit 1
        fi
        echo "✅ Artifact '${ART_NAME}' downloaded from NAS -> ${ITEMS[*]}"
